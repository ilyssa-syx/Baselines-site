function comparisonRows(){const legend='<span class="legend"><span><i class="dot" style="--color:#f97316"></i>Dyn-HaMR</span><span><i class="dot" style="--color:#2563eb"></i>HaWoR</span><span><i class="dot" style="--color:#12b981"></i>Ground truth</span></span>',axisKey='<span class="axis-key"><b class="axis-x">X</b> right · <b class="axis-y">Y</b> up · <b class="axis-z">Z</b> back</span>';els.methods.innerHTML='<article class="method comparison" style="--method:#315ee8"><section class="visual"><div class="visual-head"><span>2D camera overlay</span>'+legend+'</div><div class="viewport overlay"><canvas></canvas></div></section><section class="visual"><div class="visual-head"><span>3D camera-space hands</span><span class="visual-tools">'+legend+'<button class="reset">Reset view</button></span><span class="status">Waiting</span></div><div class="viewport world">'+axisKey+'</div><div class="availability">Waiting for example</div></section></article>';const row=els.methods.querySelector('.comparison'),os=row.querySelector('.overlay'),ws=row.querySelector('.world'),oscene=new THREE.Scene(),wscene=new THREE.Scene(),ocam=new THREE.Camera(),wcam=new THREE.PerspectiveCamera(42,1,.005,20),controls=new OrbitControls(wcam,ws),axes=new THREE.AxesHelper(1);ocam.matrixAutoUpdate=false;ocam.matrixWorld.identity();ocam.matrixWorldInverse.identity();controls.enableDamping=true;controls.target.set(0,0,-.6);wcam.position.set(.55,.35,.75);wscene.add(new THREE.HemisphereLight(0xffffff,0x667085,2.3));const light=new THREE.DirectionalLight(0xffffff,2);light.position.set(1,1.5,1);wscene.add(light,axes);const view={row,os,ws,canvas:row.querySelector('canvas'),status:row.querySelector('.status'),availability:row.querySelector('.availability'),oscene,wscene,ocam,wcam,controls,axes,meshes:[]};controls.addEventListener('change',()=>state.render=true);row.querySelector('.reset').onclick=()=>fit(view);state.views.set('comparison',view)}
async function loadBundle(url,signal){const response=await fetch(url,{signal});if(!response.ok)throw new Error(`HTTP ${response.status}`);const raw=await new Response(response.body.pipeThrough(new DecompressionStream('gzip'))).arrayBuffer(),dv=new DataView(raw);if(String.fromCharCode(...new Uint8Array(raw,0,4))!=='HND1')throw new Error('invalid hand bundle');let p=4;const version=dv.getUint32(p,true);p+=4;const frames=dv.getUint32(p,true);p+=4;const hands=dv.getUint32(p,true);p+=4;const vertices=dv.getUint32(p,true);p+=4;const faces=dv.getUint32(p,true);p+=8;const frameIds=new Int32Array(raw,p,frames);p+=frames*4;const intrinsics=new Float32Array(raw,p,frames*9);p+=frames*9*4;const valid=new Uint8Array(raw,p,hands*frames);p+=hands*frames;while(p%4)p++;const positions=new Float32Array(raw,p,hands*frames*vertices*3);p+=positions.byteLength;const indices=new Uint32Array(raw,p,hands*faces*3);return{version,frames,hands,vertices,faces,frameIds,intrinsics,valid,positions,indices}}
function material(color,overlay,gt){return overlay?new THREE.MeshBasicMaterial({color,transparent:true,opacity:gt?.25:.48,side:THREE.DoubleSide,depthWrite:false}):new THREE.MeshStandardMaterial({color,transparent:true,opacity:gt?.34:.68,roughness:.72,side:THREE.DoubleSide,depthWrite:false})}
function addMeshes(view,bundle,color,gt){for(let hand=0;hand<bundle.hands;hand++){for(const [scene,overlay] of [[view.oscene,true],[view.wscene,false]]){const geometry=new THREE.BufferGeometry(),position=new THREE.BufferAttribute(new Float32Array(bundle.vertices*3),3);position.setUsage(THREE.DynamicDrawUsage);geometry.setAttribute('position',position);geometry.setIndex(new THREE.BufferAttribute(bundle.indices.subarray(hand*bundle.faces*3,(hand+1)*bundle.faces*3),1));const mesh=new THREE.Mesh(geometry,material(color,overlay,gt));mesh.userData={bundle,hand,gt,overlay,view};mesh.renderOrder=gt?1:2;scene.add(mesh);view.meshes.push(mesh)}}}
function clear(){for(const view of state.views.values()){for(const mesh of view.meshes){mesh.parent.remove(mesh);mesh.geometry.dispose();mesh.material.dispose()}view.meshes=[]}}
function configureCamera(view,K){const fx=K[0],fy=K[4],cx=K[2],cy=K[5],w=state.example.width,h=state.example.height,n=.005,f=20;view.ocam.projectionMatrix.set(2*fx/w,0,1-2*cx/w,0,0,2*fy/h,2*cy/h-1,0,0,0,-(f+n)/(f-n),-2*f*n/(f-n),0,0,-1,0);view.ocam.projectionMatrixInverse.copy(view.ocam.projectionMatrix).invert()}
function updateMesh(mesh){const {bundle:b,hand:h,gt,overlay,view}=mesh.userData,valid=b.valid[h*b.frames+state.frame]!==0,selected=view.handMode==='both'||(view.handMode==='left'&&h===0)||(view.handMode==='right'&&h===1);mesh.visible=valid&&(gt||overlay||selected);if(!mesh.visible)return;const start=((h*b.frames+state.frame)*b.vertices)*3;mesh.geometry.attributes.position.array.set(b.positions.subarray(start,start+b.vertices*3));mesh.geometry.attributes.position.needsUpdate=true;mesh.geometry.computeVertexNormals()}
function setHandMode(view,mode){view.handMode=mode;view.row.querySelectorAll('[data-hand]').forEach(button=>button.setAttribute('aria-pressed',String(button.dataset.hand===mode)));view.meshes.forEach(updateMesh);fit(view);state.render=true}
function drawVideo(){if(els.video.readyState<2)return;for(const view of state.views.values()){const rect=view.canvas.getBoundingClientRect(),scale=Math.min(devicePixelRatio,1.25),w=Math.max(1,Math.round((rect.width||640)*scale)),h=Math.round(w*state.example.height/state.example.width);if(view.canvas.width!==w||view.canvas.height!==h){view.canvas.width=w;view.canvas.height=h}view.canvas.getContext('2d',{alpha:false}).drawImage(els.video,0,0,w,h)}state.render=true}
function update(frame,seek=true){if(!state.bundles)return;state.frame=Math.max(0,Math.min(state.example.sampledFrameCount-1,Math.round(Number(frame)||0)));for(const m of MANIFEST.methods){const view=state.views.get(m.key),pred=state.bundles[m.key],gt=state.bundles.gt;configureCamera(view,pred.intrinsics.subarray(state.frame*9,state.frame*9+9));view.meshes.forEach(updateMesh);const pv=[0,1].filter(h=>pred.valid[h*pred.frames+state.frame]).length,gv=[0,1].filter(h=>gt.valid[h*gt.frames+state.frame]).length;view.status.textContent=`${pv} predicted hand${pv===1?'':'s'} · ${gv} GT hand${gv===1?'':'s'}`}const source=state.example.sampledFrameIds[state.frame];els.frame.value=state.frame;els.number.value=state.frame;els.readout.textContent=`Sample ${state.frame} / ${state.example.sampledFrameCount-1} · source frame ${source}`;if(seek&&els.video.readyState>=1){try{els.video.currentTime=(source+.15)/state.example.fps}catch(_){}}drawVideo();state.render=true}
function fit(view){const box=new THREE.Box3(),visible=view.meshes.filter(m=>m.visible&&m.parent===view.wscene);if(!visible.length)return;visible.forEach(m=>{m.updateMatrixWorld(true);box.union(new THREE.Box3().setFromObject(m))});const c=box.getCenter(new THREE.Vector3()),size=box.getSize(new THREE.Vector3()),s=Math.max(size.length(),.08),axisLength=Math.max(s*.22,.035);view.controls.target.copy(c);view.wcam.position.copy(c).add(new THREE.Vector3(s*.95,s*.62,s*1.45));view.wcam.near=Math.max(.001,s/300);view.wcam.far=Math.max(10,s*80);view.wcam.updateProjectionMatrix();view.axes.position.set(box.min.x-axisLength*.25,box.min.y-axisLength*.25,box.max.z+axisLength*.25);view.axes.scale.setScalar(axisLength);view.controls.update()}
function pause(){state.playing=false;els.play.textContent='Play';els.play.setAttribute('aria-pressed','false');els.video.pause()}function play(){if(!state.bundles)return;state.playing=true;state.last=performance.now();state.carry=0;els.play.textContent='Pause';els.play.setAttribute('aria-pressed','true')}
async function select(index){const token=++state.token;pause();clear();state.bundles=null;state.example=MANIFEST.examples[index];const e=state.example,controller=new AbortController();els.frame.max=e.sampledFrameCount-1;els.number.max=e.sampledFrameCount-1;els.video.src=e.videoSrc;els.video.load();document.documentElement.style.setProperty('--aspect',`${e.width}/${e.height}`);for(const m of MANIFEST.methods){const v=state.views.get(m.key);v.status.textContent='Loading…';v.availability.textContent=`Prediction ${e.availability[m.key].available} hand-frames · GT ${e.availability.gt.available} hand-frames`}try{const entries=await Promise.all([['gt',e.assets.gt],...MANIFEST.methods.map(m=>[m.key,e.assets[m.key]])].map(async([k,u])=>[k,await loadBundle(u,controller.signal)]));if(token!==state.token)return;state.bundles=Object.fromEntries(entries);for(const m of MANIFEST.methods){const v=state.views.get(m.key);addMeshes(v,state.bundles[m.key],m.color,false);addMeshes(v,state.bundles.gt,GT,true)}update(0,true);state.views.forEach(fit);els.hint.textContent=`Showing ${e.sampledFrameCount} uniformly sampled frames from ${e.sourceFrameCount} source frames. Both methods and GT are synchronized.`;const u=new URL(location.href);u.searchParams.set('example',e.key);history.replaceState(null,'',u)}catch(error){if(token!==state.token)return;state.views.forEach(v=>v.status.textContent=`Load failed: ${error.message}`);els.hint.textContent='Serve this directory over HTTP; file:// cannot fetch compressed assets.';console.error(error)}}
function renderView(slot,scene,camera,alpha){const r=slot.getBoundingClientRect(),w=Math.round(r.width),h=Math.round(r.height);if(w<1||h<1||r.bottom<0||r.top>innerHeight)return;renderer.setViewport(Math.round(r.left),Math.round(innerHeight-r.bottom),w,h);renderer.setScissor(Math.round(r.left),Math.round(innerHeight-r.bottom),w,h);renderer.setScissorTest(true);renderer.setClearColor(alpha?0:0xe9eef5,alpha?0:1);renderer.clear(true,true,true);if(camera.isPerspectiveCamera){camera.aspect=w/h;camera.updateProjectionMatrix()}renderer.render(scene,camera)}
function render(){renderer.setSize(innerWidth,innerHeight,false);renderer.setScissorTest(false);renderer.setClearColor(0,0);renderer.clear();for(const v of state.views.values()){renderView(v.os,v.oscene,v.ocam,true);renderView(v.ws,v.wscene,v.wcam,false)}renderer.setScissorTest(false);state.render=false}
function animate(now){if(state.playing&&state.bundles){state.carry+=(now-state.last)/1000*state.fps;const steps=Math.floor(state.carry);if(steps){state.carry-=steps;update((state.frame+steps)%state.example.sampledFrameCount,true)}}state.views.forEach(v=>{if(v.controls.update())state.render=true});state.last=now;if(state.render)render();requestAnimationFrame(animate)}
options();rows();els.summary.textContent=`${MANIFEST.examples.length} examples · prediction + ground truth`;const requested=new URL(location.href).searchParams.get('example'),initial=Math.max(0,MANIFEST.examples.findIndex(e=>e.key===requested));els.example.value=initial;els.example.onchange=()=>select(Number(els.example.value));els.play.onclick=()=>state.playing?pause():play();els.frame.oninput=()=>{pause();update(els.frame.value,true)};els.number.onchange=()=>{pause();update(els.number.value,true)};els.fps.onchange=()=>state.fps=Math.max(1,Math.min(30,Number(els.fps.value)||10));els.video.onseeked=drawVideo;els.video.onloadedmetadata=()=>update(state.frame,true);addEventListener('scroll',()=>state.render=true,{passive:true});addEventListener('resize',()=>{drawVideo();state.render=true},{passive:true});select(initial);requestAnimationFrame(animate);
addMeshes=function(view,bundle,color,layer,gt){for(let hand=0;hand<bundle.hands;hand++){for(const [scene,overlay] of [[view.oscene,true],[view.wscene,false]]){const geometry=new THREE.BufferGeometry(),position=new THREE.BufferAttribute(new Float32Array(bundle.vertices*3),3);position.setUsage(THREE.DynamicDrawUsage);geometry.setAttribute('position',position);geometry.setIndex(new THREE.BufferAttribute(bundle.indices.subarray(hand*bundle.faces*3,(hand+1)*bundle.faces*3),1));const mesh=new THREE.Mesh(geometry,material(color,overlay,gt));mesh.userData={bundle,hand,layer,overlay,view};mesh.renderOrder=gt?1:2;scene.add(mesh);view.meshes.push(mesh)}}};
updateMesh=function(mesh){const data=mesh.userData,b=data.bundle,valid=b.valid[data.hand*b.frames+state.frame]!==0;mesh.visible=valid&&state.visible[data.layer];if(!mesh.visible)return;const start=((data.hand*b.frames+state.frame)*b.vertices)*3;mesh.geometry.attributes.position.array.set(b.positions.subarray(start,start+b.vertices*3));mesh.geometry.attributes.position.needsUpdate=true;mesh.geometry.computeVertexNormals()};
update=function(frame,seek=true){if(!state.bundles)return;state.frame=Math.max(0,Math.min(state.example.sampledFrameCount-1,Math.round(Number(frame)||0)));const view=state.views.get('comparison'),cameraBundle=state.bundles.gt;configureCamera(view,cameraBundle.intrinsics.subarray(state.frame*9,state.frame*9+9));view.meshes.forEach(updateMesh);const counts=[['dynhamr','Dyn-HaMR'],['hawor','HaWoR'],['gt','GT']].map(pair=>pair[1]+': '+[0,1].filter(h=>state.bundles[pair[0]].valid[h*state.bundles[pair[0]].frames+state.frame]).length);view.status.textContent=counts.join(' · ');const source=state.example.sampledFrameIds[state.frame];els.frame.value=state.frame;els.number.value=state.frame;els.readout.textContent='Sample '+state.frame+' / '+(state.example.sampledFrameCount-1)+' · source frame '+source;if(seek&&els.video.readyState>=1){try{els.video.currentTime=(source+.15)/state.example.fps}catch(_){}}drawVideo();state.render=true};
function setLayer(layer){state.visible[layer]=!state.visible[layer];els.layers.forEach(button=>button.setAttribute('aria-pressed',String(state.visible[button.dataset.layer])));if(state.bundles){const view=state.views.get('comparison');view.meshes.forEach(updateMesh);fit(view);state.render=true}}
select=async function(index){const token=++state.token;pause();clear();state.bundles=null;state.example=MANIFEST.examples[index];const e=state.example,controller=new AbortController(),view=state.views.get('comparison');els.frame.max=e.sampledFrameCount-1;els.number.max=e.sampledFrameCount-1;els.video.src=e.videoSrc;els.video.load();document.documentElement.style.setProperty('--aspect',e.width+'/'+e.height);view.status.textContent='Loading…';view.availability.textContent='Dyn-HaMR '+e.availability.dynhamr.available+' hand-frames · HaWoR '+e.availability.hawor.available+' hand-frames · GT '+e.availability.gt.available+' hand-frames';try{const entries=await Promise.all([['gt',e.assets.gt],...MANIFEST.methods.map(m=>[m.key,e.assets[m.key]])].map(async pair=>[pair[0],await loadBundle(pair[1],controller.signal)]));if(token!==state.token)return;state.bundles=Object.fromEntries(entries);for(const m of MANIFEST.methods)addMeshes(view,state.bundles[m.key],m.color,m.key,false);addMeshes(view,state.bundles.gt,GT,'gt',true);update(0,true);fit(view);els.hint.textContent='Showing '+e.sampledFrameCount+' uniformly sampled frames from '+e.sourceFrameCount+' source frames. Dyn-HaMR, HaWoR, and GT are synchronized.';const u=new URL(location.href);u.searchParams.set('example',e.key);history.replaceState(null,'',u)}catch(error){if(token!==state.token)return;view.status.textContent='Load failed: '+error.message;els.hint.textContent='Serve this directory over HTTP; file:// cannot fetch compressed assets.';console.error(error)}};
els.layers.forEach(button=>button.onclick=()=>setLayer(button.dataset.layer));state.views.clear();comparisonRows();select(Number(els.example.value));
