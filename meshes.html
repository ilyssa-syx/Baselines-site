<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mesh comparison</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"></script>
<style>
  :root { color-scheme:light; --ink:#172033; --muted:#657087; --line:#d9dfeb; --panel:#fff; --bg:#f5f7fb; --accent:#315ee8; }
  * { box-sizing:border-box; }
  body { margin:0; color:var(--ink); background:var(--bg); font:14px/1.45 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  header { position:sticky; top:0; z-index:10; padding:15px 20px 12px; border-bottom:1px solid var(--line); background:rgba(255,255,255,.96); backdrop-filter:blur(10px); }
  .title-row { display:flex; align-items:baseline; justify-content:space-between; gap:16px; margin-bottom:11px; }
  h1 { margin:0; font-size:22px; }
  .summary { color:var(--muted); font-size:12px; }
  .toolbar { display:flex; flex-wrap:wrap; align-items:end; gap:10px; }
  label { display:grid; gap:4px; color:var(--muted); font-size:11px; font-weight:700; }
  select,button { min-height:35px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink); font:inherit; }
  select { min-width:min(430px,80vw); padding:5px 9px; }
  button { padding:5px 12px; cursor:pointer; font-weight:700; }
  button:hover,button[aria-pressed="true"] { border-color:var(--accent); color:var(--accent); background:#f4f7ff; }
  .view-buttons { display:flex; flex-wrap:wrap; gap:5px; }
  .view-buttons button { min-height:31px; padding:4px 9px; font-size:12px; }
  .hint { margin-top:8px; color:var(--muted); font-size:12px; }
  main { padding:18px; }
  .object-line { margin:0 0 12px; color:var(--muted); }
  .object-line strong { color:var(--ink); text-transform:capitalize; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(360px,1fr)); gap:16px; }
  .card { min-width:0; overflow:hidden; border:1px solid var(--line); border-radius:12px; background:var(--panel); box-shadow:0 8px 24px rgba(29,42,72,.06); }
  .card-head { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 13px; border-bottom:1px solid var(--line); }
  .card-head strong { font-size:14px; }
  .status { color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; }
  model-viewer { display:block; width:100%; height:480px; background:radial-gradient(circle at 50% 42%,#fdfefe 0,#e8edf4 70%,#dce3ec 100%); --poster-color:transparent; }
  model-viewer::part(default-progress-bar) { height:3px; background-color:var(--accent); }
  .error { display:none; place-items:center; height:480px; padding:24px; color:#9b3443; text-align:center; }
  .card.failed model-viewer { display:none; }
  .card.failed .error { display:grid; }
  @media (max-width:760px) { .title-row { align-items:flex-start; flex-direction:column; gap:3px; } select { min-width:min(100%,90vw); } .grid { grid-template-columns:1fr; } model-viewer,.error { height:390px; } }
</style>
</head>
<body>
<header>
  <div class="title-row"><h1>Mesh comparison</h1><div class="summary" id="summary"></div></div>
  <div class="toolbar">
    <label>Example<select id="example"></select></label>
    <button id="spin" type="button" aria-pressed="false">Auto rotate</button>
    <button id="sync" type="button" aria-pressed="true">Sync cameras</button>
    <button id="reset" type="button">Reset</button>
    <div class="view-buttons" aria-label="Preset camera views">
      <button data-view="0 90">Front</button><button data-view="180 90">Back</button>
      <button data-view="-90 90">Left</button><button data-view="90 90">Right</button>
      <button data-view="0 0.1">Top</button><button data-view="0 179.9">Bottom</button>
      <button data-view="35 65">3/4</button>
    </div>
  </div>
  <div class="hint">Drag to orbit, scroll or pinch to zoom, and right-drag to pan. Camera angles are synchronized across all five reconstructions.</div>
</header>
<main>
  <p class="object-line">Object: <strong id="object-name"></strong></p>
  <div class="grid" id="grid"></div>
</main>

const els = {
  example:document.getElementById('example'), grid:document.getElementById('grid'),
  spin:document.getElementById('spin'), sync:document.getElementById('sync'),
  reset:document.getElementById('reset'), summary:document.getElementById('summary'),
  objectName:document.getElementById('object-name')
};
let viewers=[];
let syncing=false;

function optionGroups() {
  const groups=new Map();
  MANIFEST.examples.forEach((example,index)=>{
    if(!groups.has(example.dataset)){const group=document.createElement('optgroup');group.label=example.dataset;groups.set(example.dataset,group);els.example.append(group);}
    const option=document.createElement('option');option.value=index;option.textContent=example.label;groups.get(example.dataset).append(option);
  });
}

function syncFrom(source) {
  if(syncing || els.sync.getAttribute('aria-pressed')!=='true' || !source.loaded)return;
  syncing=true;
  const orbit=source.getCameraOrbit();
  viewers.forEach(viewer=>{
    if(viewer===source || !viewer.loaded)return;
    const own=viewer.getCameraOrbit();
    viewer.cameraOrbit=`${orbit.theta}rad ${orbit.phi}rad ${own.radius}m`;
    viewer.fieldOfView=`${source.getFieldOfView()}deg`;
  });
  requestAnimationFrame(()=>{syncing=false;});
}

function makeCard(method,src) {
  const card=document.createElement('section');card.className='card';
  const head=document.createElement('div');head.className='card-head';
  const title=document.createElement('strong');title.textContent=method.label;
  const status=document.createElement('span');status.className='status';status.textContent='Loading…';
  head.append(title,status);
  const viewer=document.createElement('model-viewer');
  viewer.src=src;viewer.alt=`3D mesh for ${method.label}`;viewer.setAttribute('camera-controls','');
  viewer.setAttribute('touch-action','pan-y');viewer.setAttribute('interaction-prompt','none');
  viewer.setAttribute('shadow-intensity','0.75');viewer.setAttribute('shadow-softness','0.9');
  viewer.setAttribute('environment-image','neutral');viewer.setAttribute('exposure','1.05');
  viewer.setAttribute('loading','eager');viewer.setAttribute('reveal','auto');
  const error=document.createElement('div');error.className='error';error.textContent='This mesh could not be loaded.';
  viewer.addEventListener('load',()=>{viewer.loaded=true;status.textContent='Ready';});
  viewer.addEventListener('error',()=>{status.textContent='Unavailable';card.classList.add('failed');});
  viewer.addEventListener('progress',event=>{if(!viewer.loaded)status.textContent=`${Math.round(event.detail.totalProgress*100)}%`;});
  viewer.addEventListener('camera-change',()=>syncFrom(viewer));
  card.append(head,viewer,error);els.grid.append(card);return viewer;
}

function selectExample(index) {
  const example=MANIFEST.examples[index];
  viewers=[];els.grid.replaceChildren();els.objectName.textContent=example.object || 'unknown';
  MANIFEST.methods.forEach(method=>viewers.push(makeCard(method,example.assets[method.key])));
  if(els.spin.getAttribute('aria-pressed')==='true')viewers.forEach(viewer=>viewer.setAttribute('auto-rotate',''));
  const url=new URL(location.href);url.searchParams.set('example',example.key);history.replaceState(null,'',url);
}

function setPreset(theta,phi) {
  viewers.forEach(viewer=>{viewer.cameraOrbit=`${theta}deg ${phi}deg auto`;viewer.cameraTarget='auto auto auto';viewer.fieldOfView='auto';viewer.jumpCameraToGoal();});
}

optionGroups();
els.summary.textContent=`${MANIFEST.examples.length} examples · ${MANIFEST.methods.length} mesh types`;
const requested=new URL(location.href).searchParams.get('example');
const initial=Math.max(0,MANIFEST.examples.findIndex(example=>example.key===requested));
els.example.value=initial;els.example.addEventListener('change',()=>selectExample(Number(els.example.value)));
els.spin.addEventListener('click',()=>{const on=els.spin.getAttribute('aria-pressed')!=='true';els.spin.setAttribute('aria-pressed',String(on));viewers.forEach(viewer=>viewer.toggleAttribute('auto-rotate',on));});
els.sync.addEventListener('click',()=>{const on=els.sync.getAttribute('aria-pressed')!=='true';els.sync.setAttribute('aria-pressed',String(on));});
els.reset.addEventListener('click',()=>setPreset(0,75));
document.querySelectorAll('[data-view]').forEach(button=>button.addEventListener('click',()=>setPreset(...button.dataset.view.split(' ').map(Number))));
selectExample(initial);
</script>
</body>
</html>
