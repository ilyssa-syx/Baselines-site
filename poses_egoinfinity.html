function render(){ensureRendererSize();renderer.clear();for(const view of state.views.values())if(view.nearViewport){renderView(view,view.overlaySlot,view.overlayScene,view.overlayCamera,true);renderView(view,view.worldSlot,view.worldScene,view.worldCamera,false);}renderer.setScissorTest(false);state.renderNeeded=false;}
function animate(now){
  if(state.playing&&state.data){let next=state.frame;if(els.video.readyState>=2&&!els.video.paused)next=Math.min(state.example.frameCount-1,Math.floor(els.video.currentTime*state.example.renderedFps+.001));else{state.carry+=(now-state.last)/1000*state.fps;const steps=Math.floor(state.carry);if(steps){next=(state.frame+steps)%state.example.frameCount;state.carry-=steps;}}if(next!==state.frame)updateFrame(next,false);}
  state.last=now;if(state.renderNeeded)render();requestAnimationFrame(animate);
}

optionGroups();buildRows();els.summary.textContent=`${MANIFEST.examples.length} examples · ${MANIFEST.methods.length} experiment${MANIFEST.methods.length===1?'':'s'}`;
const requested=new URL(location.href).searchParams.get('example'),initial=Math.max(0,MANIFEST.examples.findIndex(example=>example.key===requested));els.example.value=String(initial);
els.example.addEventListener('change',()=>selectExample(Number(els.example.value)));els.play.addEventListener('click',()=>state.playing?pause():play());els.frame.addEventListener('input',()=>{pause();updateFrame(els.frame.value,true);});els.frameNumber.addEventListener('change',()=>{pause();updateFrame(els.frameNumber.value,true);});els.fps.addEventListener('change',()=>setFps(els.fps.value));els.video.addEventListener('loadedmetadata',()=>updateFrame(state.frame,true));els.video.addEventListener('seeked',drawVideoFrames);
addEventListener('scroll',()=>{state.renderNeeded=true;},{passive:true});addEventListener('resize',()=>{drawVideoFrames();state.renderNeeded=true;},{passive:true});
addEventListener('keydown',event=>{const activeTag=document.activeElement&&document.activeElement.tagName;if(['INPUT','SELECT','BUTTON'].includes(activeTag))return;if(event.code==='Space'){event.preventDefault();state.playing?pause():play();}if(event.code==='ArrowRight'){pause();updateFrame(state.frame+1,true);}if(event.code==='ArrowLeft'){pause();updateFrame(state.frame-1,true);}});
selectExample(initial);requestAnimationFrame(animate);
</script>
</body>
</html>
