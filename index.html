<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baseline Pipeline Viewer</title>
<style>
  :root { color-scheme: light; --border: #d7dde7; --ink: #172033; --muted: #5f6b7a; --panel: #f6f8fb; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); background: #ffffff; }
  header { position: sticky; top: 0; z-index: 3; display: flex; align-items: end; justify-content: space-between; gap: 18px; padding: 12px 18px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,.96); }
  h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0; }
  .meta { margin-top: 4px; color: var(--muted); font-size: 12px; }
  .example-picker { width: min(560px, 48vw); }
  .example-picker label { display: block; margin-bottom: 4px; color: var(--muted); font-size: 11px; }
  .example-picker select { width: 100%; min-height: 34px; border: 1px solid #b8c2d0; border-radius: 6px; background: #fff; padding: 5px 8px; color: var(--ink); font: inherit; font-size: 12px; }
  main { padding: 16px 18px 28px; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th, td { border: 1px solid var(--border); vertical-align: top; }
  th { position: sticky; top: 55px; z-index: 2; background: #eef2f7; padding: 8px; font-size: 12px; text-align: left; }
  td { background: #fff; padding: 8px; }
  .example { width: 260px; background: var(--panel); }
  .rowlabel { width: 118px; color: var(--muted); font-size: 12px; background: var(--panel); }
  .example-title { font-weight: 700; font-size: 13px; line-height: 1.35; }
  .path { margin-top: 8px; color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 10px; overflow-wrap: anywhere; }
  video { background: #0d1117; display: block; }
  .input-video { width: min(720px, 100%); max-height: 280px; }
  .missing { min-height: 190px; display: grid; place-items: center; color: #7b8490; background: #f8fafc; border: 1px dashed #c8d0dc; font-size: 12px; }
  .cell-title { display: flex; align-items: center; justify-content: space-between; gap: 8px; min-width: 0; margin-bottom: 6px; font-size: 12px; color: var(--muted); }
  .cell-title span { min-width: 0; }
  .cell-title span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cell-title span:last-child { flex: 0 0 auto; text-align: right; }
  canvas { display: block; width: 100%; background: #fbfcff; border: 1px solid #d9e0ea; }
  .layout-pair { display: grid; grid-template-columns: minmax(220px, 1fr); gap: 8px; align-items: start; }
  .layout-panel-title { margin-bottom: 4px; font-size: 12px; text-align: center; color: var(--ink); }
  .layout-video { width: 100%; height: 300px; max-height: none; object-fit: contain; border: 1px solid #d9e0ea; }
  .layout-video-missing { height: 300px; display: grid; place-items: center; color: #7b8490; background: #0d1117; border: 1px dashed #c8d0dc; font-size: 12px; }
  .overlay-panel { position: relative; width: 100%; height: 300px; background: #0d1117; border: 1px solid #d9e0ea; overflow: hidden; }
  .overlay-panel .layout-video { position: absolute; inset: 0; height: 100%; border: 0; }
  .overlay-panel .layout-canvas { position: absolute; inset: 0; height: 100%; border: 0; background: transparent; }
  .layout-canvas { height: 300px; }
  .layout-tools { display: flex; align-items: center; gap: 6px; margin-top: 6px; color: var(--muted); font-size: 11px; }
  .layout-tools input { width: 58px; border: 1px solid #b8c2d0; border-radius: 4px; padding: 3px 5px; font: inherit; }
  .viewer-canvas { height: 320px; cursor: grab; }
  .viewer-canvas:active { cursor: grabbing; }
  .pointmap-canvas { height: 420px; cursor: grab; background: #10151d; }
  .pointmap-canvas:active { cursor: grabbing; }
  .pointmap-meta { color: var(--muted); font-size: 11px; }
  .pointmap-video { position: fixed; left: -2px; top: -2px; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  .controls { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  button { border: 1px solid #b8c2d0; background: #fff; border-radius: 6px; padding: 5px 9px; font-size: 12px; }
  input[type="range"] { width: 100%; min-width: 0; }
  .frame-readout { min-width: 86px; text-align: right; color: var(--muted); font-size: 11px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  @media (max-width: 800px) { header { align-items: stretch; flex-direction: column; } .example-picker { width: 100%; } th { top: 104px; } }
</style>
</head>
<body>
<header>

  <div class="example-picker"><label for="example-select">Example</label><select id="example-select"></select></div>
</header>
<main>

      edges: makeEdges(DATA.manoFaces.right),
      fill: [0.84, 0.72, 0.58, 0.92],
      edge: [0.36, 0.27, 0.22, 0.32],
      fill2d: "rgba(247, 217, 177, 0.62)",
      stroke2d: "rgba(128, 86, 42, 0.48)",
    });
  }
  if (!raw.handStreams.length) {
    raw.handVerts = decodeArray(raw.arrays.handVerts);
    const faces = DATA.manoFaces[raw.handSide];
    raw.handStreams.push({
      side: raw.handSide,
      verts: raw.handVerts,
      valid: null,
      faces,
      edges: makeEdges(faces),
      fill: [0.84, 0.72, 0.58, 0.92],
      edge: [0.36, 0.27, 0.22, 0.32],
      fill2d: "rgba(247, 247, 255, 0.72)",
      stroke2d: "rgba(145, 143, 178, 0.55)",
    });
  }
  raw.objEdges = makeEdges(raw.objFaces);
  raw.objFrameVerts = new Float32Array(raw.objVerts.length);
  raw.prepared = true;
  return raw;
}

DATA.manoFaces.left = decodeArray(DATA.manoFaces.left);
DATA.manoFaces.right = decodeArray(DATA.manoFaces.right);

function loadEntry(entry) {
  if (entry.arrays) return Promise.resolve(entry);
  const id = entry.assetId;
  if (!id || !entry.assetSrc) return Promise.reject(new Error("geometry asset missing"));
  if (window.VIS_PIPELINE_ASSETS[id]) {
    Object.assign(entry, window.VIS_PIPELINE_ASSETS[id]);
    return Promise.resolve(entry);
  }
  if (!PENDING_ASSETS[id]) {
    PENDING_ASSETS[id] = new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = entry.assetSrc;
      script.onload = () => {
        const asset = window.VIS_PIPELINE_ASSETS[id];
        if (!asset) return reject(new Error(`asset ${id} did not register`));
        Object.assign(entry, asset);
        resolve(entry);
      };
      script.onerror = () => reject(new Error(`failed to load ${entry.assetSrc}`));
      document.head.appendChild(script);
    });
  }
  return PENDING_ASSETS[id];
}

function loadPointmap(spec) {
  if (!spec) return Promise.reject(new Error("VGGT pointmap unavailable"));
  if (spec.depth) return Promise.resolve(spec);
  const id = spec.depthSrc;
  if (!PENDING_POINTMAPS[id]) {
    PENDING_POINTMAPS[id] = fetch(spec.depthSrc).then(async response => {
      if (!response.ok) throw new Error(`failed to load ${spec.depthSrc}`);
      if (typeof DecompressionStream === "undefined") {
        throw new Error("this browser does not support gzip depth decoding");
      }
      const stream = response.body.pipeThrough(new DecompressionStream("gzip"));
      const buffer = await new Response(stream).arrayBuffer();
      spec.depth = new Uint16Array(buffer);
      spec.intrinsicsArray = decodeArray(spec.intrinsics);
      return spec;
    });
  }
  return PENDING_POINTMAPS[id];
}

function buildTable() {
  const table = document.getElementById("viewer-table");
  const colgroup = document.createElement("colgroup");
  const widths = ["260px", "118px"].concat(DATA.baselines.map(() => "minmax(360px, 1fr)"));
  for (const _ of widths) colgroup.appendChild(document.createElement("col"));
  table.appendChild(colgroup);

  const head = document.createElement("tr");
  head.innerHTML = `<th>Example</th><th>Line</th>${DATA.baselines.map(b => `<th>${DATA.baselineLabels[b] || b}</th>`).join("")}`;
  table.appendChild(head);

  for (const ex of DATA.examples) {
    const videoRow = document.createElement("tr");
    videoRow.dataset.exampleId = ex.id;
    videoRow.innerHTML = `
      <td class="example" rowspan="4">
        <div class="example-title">${escapeHtml(ex.label)}</div>
        ${ex.sourcePath ? `<div class="path">${escapeHtml(ex.sourcePath)}</div>` : ""}
      </td>
      <td class="rowlabel">Input video</td>
      <td colspan="${DATA.baselines.length}">${videoHtml(ex)}</td>`;
    table.appendChild(videoRow);

    const viewerRow = document.createElement("tr");
    viewerRow.dataset.exampleId = ex.id;
    viewerRow.innerHTML = `
      <td class="rowlabel">3D viewer</td>
      ${DATA.baselines.map(b => baselineCell(ex, b, "viewer")).join("")}`;
    table.appendChild(viewerRow);

    const pointmapRow = document.createElement("tr");
    pointmapRow.dataset.exampleId = ex.id;
    pointmapRow.innerHTML = `<td class="rowlabel">VGGT depth pointmap</td><td colspan="${DATA.baselines.length}">${pointmapCell(ex, "pointmap", "VGGT-Omega depth pointmap")}</td>`;
    table.appendChild(pointmapRow);

    const gtPointmapRow = document.createElement("tr");
    gtPointmapRow.dataset.exampleId = ex.id;
    gtPointmapRow.innerHTML = `<td class="rowlabel">GT depth pointmap</td><td colspan="${DATA.baselines.length}">${pointmapCell(ex, "gtPointmap", "Groundtruth depth pointmap")}</td>`;
    table.appendChild(gtPointmapRow);
  }

  const select = document.getElementById("example-select");
  for (const ex of DATA.examples) {

    option.textContent = ex.label;
    select.appendChild(option);
  }

function showExample(exampleId) {
  for (const row of document.querySelectorAll("tr[data-example-id]")) {
    row.hidden = Number(row.dataset.exampleId) !== exampleId;
  }
  const example = DATA.examples.find(ex => ex.id === exampleId);
  document.getElementById("summary").textContent = `Showing 1 of ${DATA.examples.length} examples · ${DATA.baselines.map(b => DATA.baselineLabels[b] || b).join(" / ")}`;
  const url = new URL(location.href);
  url.searchParams.set("example", String(exampleId));
  history.replaceState(null, "", url);
  document.title = example ? `${example.label} · Baseline Viewer` : "Baseline Pipeline Viewer";
}

function pointmapCell(ex, key, title) {
  const spec = ex[key];
  if (!spec) return `<div class="missing">${escapeHtml(title)} not found</div>`;
  const id = `${key}-${ex.id}`;
  const video = ex.videoSrc ? `<video class="pointmap-video" data-src="${escapeHtml(ex.videoSrc)}" muted playsinline preload="auto"></video>` : "";
  return `<div class="cell-title"><span>${escapeHtml(title)} <span id="${id}-frame">frame 0</span></span><span class="pointmap-meta">${Number(spec.numPoints).toLocaleString()} RGB points · ${spec.numFrames} frames · stride ${spec.stride}</span></div><canvas id="${id}" class="pointmap-canvas" data-example="${ex.id}" data-pointmap="${key}"></canvas>${video}`;
}

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function videoHtml(ex) {
  if (!ex.videoSrc) return `<div class="missing">input video not found</div>`;
  return `<video class="input-video" src="${escapeHtml(ex.videoSrc)}" controls playsinline preload="metadata"></video>`;
}

function baselineCell(ex, baseline, kind) {
  const entry = ex.baselines[baseline];
  if (!entry) return `<td><div class="missing">${escapeHtml(DATA.baselineLabels[baseline] || baseline)} skipped</div></td>`;
  const id = `${kind}-${ex.id}-${baseline}`.replace(/[^A-Za-z0-9_-]/g, "_");
  if (kind === "layout") {
    const overlayVideo = entry.overlayVideoSrc
      ? `<video class="layout-video lazy-video" data-src="${escapeHtml(entry.overlayVideoSrc)}" controls muted loop playsinline preload="none"></video>`
      : `<div class="layout-video-missing">2D overlay mp4 not rendered</div>`;
    return `<td><div class="cell-title"><span title="${escapeHtml(entry.seqName)}">${escapeHtml(entry.seqName)}</span><span>${entry.numFrames} frames</span></div><div class="layout-pair"><div><div class="layout-panel-title">pred mesh</div>${overlayVideo}</div></div></td>`;
  }
  return `<td>
    <div class="cell-title"><span title="${escapeHtml(entry.seqName)}">${escapeHtml(entry.seqName)}</span><span>${entry.handSide} hand</span></div>
    <canvas id="${id}" class="viewer-canvas" data-example="${ex.id}" data-baseline="${baseline}"></canvas>
    <div class="controls"><button type="button" data-action="play" data-target="${id}">Pause</button><input type="range" min="0" max="${entry.numFrames - 1}" value="0" data-action="seek" data-target="${id}"><span class="frame-readout" id="${id}-readout">0 / ${entry.numFrames - 1}</span></div>
  </td>`;
}

class WebglViewer {
  constructor(canvas, entry) {
    this.canvas = canvas;
    this.entry = prepareEntry(entry);
    this.frame = 0;
    this.playing = true;
    this.yaw = -0.55;
    this.pitch = -0.28;
    this.zoom = 0.42;
    this.drag = null;
    this.frameCarry = 0;
    this.gl = canvas.getContext("webgl", {antialias: true});
    if (!this.gl) throw new Error("WebGL unavailable");
    if ((this.entry.objFaces instanceof Uint32Array || this.entry.objEdges instanceof Uint32Array) && !this.gl.getExtension("OES_element_index_uint")) {
      throw new Error("WebGL uint32 index extension unavailable");
    }
    this.canvas.addEventListener("webglcontextlost", e => {
      e.preventDefault();
    }, false);
    this.initGl();
    this.bindEvents();
  }

  initGl() {
    const gl = this.gl;
    const vs = `attribute vec3 position; uniform mat3 uRot; uniform float uZoom; uniform float uAspect; void main(){ vec3 cam = vec3(position.x, -position.y, position.z); vec3 p = uRot * cam; gl_Position = vec4(p.x/(uZoom*uAspect), p.y/uZoom, p.z*0.10, 1.0); }`;
    const fs = `precision mediump float; uniform vec4 uColor; void main(){ gl_FragColor = uColor; }`;
    this.program = makeProgram(gl, vs, fs);
    this.positionLoc = gl.getAttribLocation(this.program, "position");
    this.rotLoc = gl.getUniformLocation(this.program, "uRot");
    this.zoomLoc = gl.getUniformLocation(this.program, "uZoom");
    this.aspectLoc = gl.getUniformLocation(this.program, "uAspect");
    this.colorLoc = gl.getUniformLocation(this.program, "uColor");
    this.handBuffers = this.entry.handStreams.map(stream => ({
      stream,
      vertex: gl.createBuffer(),
      face: null,
      edge: null,
    }));
    this.objBuffer = gl.createBuffer();
    this.objFaceBuffer = indexBuffer(gl, this.entry.objFaces);
    for (const item of this.handBuffers) {
      item.face = indexBuffer(gl, item.stream.faces);
      item.edge = indexBuffer(gl, item.stream.edges);
    }
    this.objEdgeBuffer = indexBuffer(gl, this.entry.objEdges);
    gl.enable(gl.DEPTH_TEST);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  }

  bindEvents() {
    this.canvas.addEventListener("pointerdown", e => {
      this.canvas.setPointerCapture(e.pointerId);
      this.drag = {x: e.clientX, y: e.clientY, yaw: this.yaw, pitch: this.pitch};
    });
    this.canvas.addEventListener("pointermove", e => {
      if (!this.drag) return;
      this.yaw = this.drag.yaw + (e.clientX - this.drag.x) * 0.01;
      this.pitch = Math.max(-1.35, Math.min(1.35, this.drag.pitch + (e.clientY - this.drag.y) * 0.01));
    });
    this.canvas.addEventListener("pointerup", () => { this.drag = null; });
    this.canvas.addEventListener("wheel", e => {
      e.preventDefault();
      this.zoom = Math.max(0.16, Math.min(1.1, this.zoom * (e.deltaY > 0 ? 1.08 : 0.92)));
    }, {passive: false});
  }

  setFrame(frame) {
    this.frame = Math.max(0, Math.min(this.entry.numFrames - 1, frame | 0));
    this.frameCarry = 0;
  }

  destroy() {
    const gl = this.gl;
    if (!gl) return;
    const buffers = [this.objBuffer, this.objFaceBuffer, this.objEdgeBuffer];
    for (const item of this.handBuffers || []) buffers.push(item.vertex, item.face, item.edge);
    for (const buffer of buffers) {
      if (buffer) gl.deleteBuffer(buffer);
    }
    if (this.program) gl.deleteProgram(this.program);
    const lose = gl.getExtension("WEBGL_lose_context");
    if (lose) lose.loseContext();
    this.gl = null;
  }

  draw() {
    const gl = this.gl;
    if (!gl || gl.isContextLost()) return;
    resizeCanvas(this.canvas);
    gl.viewport(0, 0, this.canvas.width, this.canvas.height);
    gl.clearColor(0.985, 0.99, 1.0, 1);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
    gl.useProgram(this.program);
    gl.uniformMatrix3fv(this.rotLoc, false, viewRot(this.yaw, this.pitch));
    gl.uniform1f(this.zoomLoc, this.zoom);
    gl.uniform1f(this.aspectLoc, this.canvas.width / Math.max(1, this.canvas.height));

    transformObject(this.entry, this.frame, this.entry.objFrameVerts);

    const handOffset = this.frame * 778 * 3;
    for (const item of this.handBuffers) {
      const stream = item.stream;
      if (stream.valid && !stream.valid[this.frame]) continue;
      const hand = stream.verts.subarray(handOffset, handOffset + 778 * 3);
      bindFloatBuffer(gl, this.positionLoc, item.vertex, hand, gl.DYNAMIC_DRAW);
      drawIndexed(gl, item.face, stream.faces.length, this.colorLoc, stream.fill, gl.TRIANGLES);
      drawIndexed(gl, item.edge, stream.edges.length, this.colorLoc, stream.edge, gl.LINES);
    }

    bindFloatBuffer(gl, this.positionLoc, this.objBuffer, this.entry.objFrameVerts, gl.DYNAMIC_DRAW);
    drawIndexed(gl, this.objFaceBuffer, this.entry.objFaces.length, this.colorLoc, [1.0, 0.42, 0.04, 0.86], gl.TRIANGLES);
    drawIndexed(gl, this.objEdgeBuffer, this.entry.objEdges.length, this.colorLoc, [0.48, 0.16, 0.02, 0.38], gl.LINES);
  }
}

class PointmapViewer {
  constructor(canvas, asset, video) {
    this.canvas = canvas;
    this.asset = asset;
    this.video = video;
    this.frame = -1;
    this.sampledVideoTime = -1;
    this.points = new Float32Array(asset.numPoints * 3);
    this.colors = new Uint8Array(asset.numPoints * 3);
    this.colors.fill(190);
    this.sampleCanvas = document.createElement("canvas");
    this.sampleCanvas.width = asset.depthShape[2];
    this.sampleCanvas.height = asset.depthShape[1];
    this.sampleContext = this.sampleCanvas.getContext("2d", {willReadFrequently:true});
    this.yaw = 0.0;
    this.pitch = 0.0;
    this.zoom = 0.58;
    this.drag = null;
    this.gl = canvas.getContext("webgl", {antialias: true});
    if (!this.gl) throw new Error("WebGL unavailable");
    this.initGl();
    this.bindEvents();
    if (this.video) {
      const refreshColors = () => { this.sampledVideoTime = -1; this.updateColors(); };
      this.video.addEventListener("loadeddata", refreshColors);
      this.video.addEventListener("seeked", refreshColors);
    }
    this.setFrame(0, false);
  }

  initGl() {
    const gl = this.gl;
    const vs = `attribute vec3 position; attribute vec3 color; uniform mat3 uRot; uniform float uZoom; uniform float uAspect; varying vec3 vColor; void main(){ vec3 p=uRot*position; gl_Position=vec4(p.x/(uZoom*uAspect),p.y/uZoom,p.z*0.2,1.0); gl_PointSize=2.4; vColor=color; }`;
    const fs = `precision mediump float; varying vec3 vColor; void main(){ vec2 d=gl_PointCoord-vec2(0.5); if(dot(d,d)>0.25) discard; gl_FragColor=vec4(vColor,1.0); }`;
    this.program = makeProgram(gl, vs, fs);
    this.positionLoc = gl.getAttribLocation(this.program, "position");
    this.colorLoc = gl.getAttribLocation(this.program, "color");
    this.rotLoc = gl.getUniformLocation(this.program, "uRot");
    this.zoomLoc = gl.getUniformLocation(this.program, "uZoom");
    this.aspectLoc = gl.getUniformLocation(this.program, "uAspect");
    this.pointBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, this.pointBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, this.points, gl.DYNAMIC_DRAW);
    this.colorBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, this.colorBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, this.colors, gl.DYNAMIC_DRAW);
    gl.enable(gl.DEPTH_TEST);
  }

  setFrame(frame, playing) {
    frame = Math.max(0, Math.min(this.asset.numFrames - 1, frame | 0));
    if (frame !== this.frame) {
      this.frame = frame;
      this.updatePoints();
      const readout = document.getElementById(`${this.canvas.id}-frame`);
      if (readout) readout.textContent = `frame ${frame}`;
    }
    if (!this.video) return;
    const fps = Number(DATA.examples[Number(this.canvas.dataset.example)].fps) || LAYOUT_FPS;
    const target = (frame + 0.5) / fps;
    if (playing) {
      if (Math.abs(this.video.currentTime - target) > 0.12 && !this.video.seeking) {
        try { this.video.currentTime = target; } catch (_) {}
      }
      ensureVideoPlaying(this.video);
    } else {
      this.video.pause();
      seekVideo(this.video, target, 0.018);
    }
    this.updateColors();
  }

  updatePoints() {
    const asset = this.asset;
    const h = asset.depthShape[1], w = asset.depthShape[2];
    const depthOffset = this.frame * h * w;
    const intrinsicsOffset = this.frame * 9;
    const K = asset.intrinsicsArray;
    const fx = K[intrinsicsOffset], fy = K[intrinsicsOffset + 4];
    const cx = K[intrinsicsOffset + 2], cy = K[intrinsicsOffset + 5];
    let sx = 0, sy = 0, sz = 0, validCount = 0;
    for (let row = 0, i = 0; row < h; row++) {
      for (let col = 0; col < w; col++, i++) {
        const z = asset.depth[depthOffset + i] * asset.depthScale;
        const o = i * 3;
        if (!(z > 0.001 && z < 5.0)) {
          this.points[o] = this.points[o + 1] = this.points[o + 2] = 99;
          continue;
        }
        const x = (col * asset.stride - cx) * z / fx;
        const y = -(row * asset.stride - cy) * z / fy;
        this.points[o] = x; this.points[o + 1] = y; this.points[o + 2] = -z;
        sx += x; sy += y; sz -= z; validCount++;
      }
    }
    const mx = sx / Math.max(1, validCount), my = sy / Math.max(1, validCount), mz = sz / Math.max(1, validCount);
    const distances = [];
    for (let i = 0; i < asset.numPoints; i++) {
      const o = i * 3;
      if (this.points[o] > 50) continue;
      const dx=this.points[o]-mx, dy=this.points[o+1]-my, dz=this.points[o+2]-mz;
      distances.push(Math.hypot(dx,dy,dz));
    }
    distances.sort((a,b) => a-b);
    const radius = Math.max(distances[Math.floor(distances.length * 0.95)] || 0, 1e-3);
    for (let i = 0; i < asset.numPoints; i++) {
      const o = i * 3;
      if (this.points[o] > 50) continue;
      this.points[o]=(this.points[o]-mx)/radius;
      this.points[o+1]=(this.points[o+1]-my)/radius;
      this.points[o+2]=(this.points[o+2]-mz)/radius;
    }
    const gl = this.gl;
    gl.bindBuffer(gl.ARRAY_BUFFER, this.pointBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, this.points, gl.DYNAMIC_DRAW);
  }

  updateColors() {
    const video = this.video;
    if (!video || video.readyState < 2 || Math.abs(video.currentTime - this.sampledVideoTime) < 0.01) return;
    this.sampleContext.drawImage(video, 0, 0, this.sampleCanvas.width, this.sampleCanvas.height);
    const rgba = this.sampleContext.getImageData(0, 0, this.sampleCanvas.width, this.sampleCanvas.height).data;
    for (let i = 0; i < this.asset.numPoints; i++) {
      this.colors[i*3]=rgba[i*4]; this.colors[i*3+1]=rgba[i*4+1]; this.colors[i*3+2]=rgba[i*4+2];
    }
    this.sampledVideoTime = video.currentTime;
    const gl = this.gl;
    gl.bindBuffer(gl.ARRAY_BUFFER, this.colorBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, this.colors, gl.DYNAMIC_DRAW);
  }

  bindEvents() {
    this.canvas.addEventListener("pointerdown", e => {
      this.canvas.setPointerCapture(e.pointerId);
      this.drag = {x:e.clientX, y:e.clientY, yaw:this.yaw, pitch:this.pitch};
    });
    this.canvas.addEventListener("pointermove", e => {
      if (!this.drag) return;
      this.yaw = this.drag.yaw + (e.clientX - this.drag.x) * 0.01;
      this.pitch = Math.max(-1.35, Math.min(1.35, this.drag.pitch + (e.clientY - this.drag.y) * 0.01));
    });
    this.canvas.addEventListener("pointerup", () => { this.drag = null; });
    this.canvas.addEventListener("wheel", e => {
      e.preventDefault();
      this.zoom = Math.max(0.2, Math.min(3.0, this.zoom * (e.deltaY > 0 ? 1.08 : 0.92)));
    }, {passive:false});
  }

  draw() {
    const gl = this.gl;
    if (!gl || gl.isContextLost()) return;
    resizeCanvas(this.canvas);
    gl.viewport(0, 0, this.canvas.width, this.canvas.height);
    gl.clearColor(0.063, 0.082, 0.114, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
    gl.useProgram(this.program);
    gl.uniformMatrix3fv(this.rotLoc, false, viewRot(this.yaw, this.pitch));
    gl.uniform1f(this.zoomLoc, this.zoom);
    gl.uniform1f(this.aspectLoc, this.canvas.width / Math.max(1, this.canvas.height));
    gl.bindBuffer(gl.ARRAY_BUFFER, this.pointBuffer);
    gl.enableVertexAttribArray(this.positionLoc);
    gl.vertexAttribPointer(this.positionLoc, 3, gl.FLOAT, false, 0, 0);
    gl.bindBuffer(gl.ARRAY_BUFFER, this.colorBuffer);
    gl.enableVertexAttribArray(this.colorLoc);
    gl.vertexAttribPointer(this.colorLoc, 3, gl.UNSIGNED_BYTE, true, 0, 0);
    gl.drawArrays(gl.POINTS, 0, this.points.length / 3);
    this.updateColors();
  }

  destroy() {
    if (!this.gl) return;
    this.gl.deleteBuffer(this.pointBuffer);
    this.gl.deleteBuffer(this.colorBuffer);
    this.gl.deleteProgram(this.program);
    const lose = this.gl.getExtension("WEBGL_lose_context");
    if (lose) lose.loseContext();
    this.gl = null;
  }
}

class Layout2D {
  constructor(canvas, entry, example) {
    this.canvas = canvas;
    this.entry = prepareEntry(entry);
    this.example = example;
    const pair = canvas.closest(".layout-pair");
    this.videos = pair ? Array.from(pair.querySelectorAll(".layout-video")) : [];
    this.video = pair ? pair.querySelector(".layout-overlay-video") || pair.querySelector(".layout-video") : null;
    this.playing = true;
    this.frame = 0;
    this.meshOffset = 0;
  }

  setFrame(frame) { this.frame = Math.max(0, Math.min(this.entry.numFrames - 1, frame | 0)); }
  setPlaying(playing) { this.playing = Boolean(playing); }
  setMeshOffset(offset) {
    this.meshOffset = Math.max(-30, Math.min(30, Number(offset) || 0));
  }
  pauseVideos() {
    for (const video of this.videos) video.pause();
  }

  syncToViewerFrame(frame, playing) {
    this.playing = Boolean(playing);
    this.frame = Math.max(0, Math.min(this.entry.numFrames - 1, frame | 0));
    if (!this.playing) {
      const target = frameToVideoTime(this.frame, this.entry, this.video);
      for (const video of this.videos) seekVideo(video, target, 0.018);
      return null;
    }
    if (!this.video || this.video.readyState === 0) {
      return null;
    }
    const primaryFrame = videoToFrame(this.video, this.entry);
    const primaryTime = this.video.currentTime;
    for (const video of this.videos) {
      if (video !== this.video) seekVideo(video, primaryTime, 0.018);
      ensureVideoPlaying(video);
    }
    this.frame = primaryFrame;
    return primaryFrame;
  }

  draw() {
    resizeCanvas(this.canvas);
    const ctx = this.canvas.getContext("2d");
    const w = this.canvas.width, h = this.canvas.height;
    ctx.clearRect(0, 0, w, h);

    const sourceSize = videoSourceSize(this.video, this.entry.projection);
    const imageRect = containRect(sourceSize.w, sourceSize.h, 0, 0, w, h);

    const meshFrame = Math.max(0, Math.min(this.entry.numFrames - 1, (this.frame + this.meshOffset) | 0));
    transformObject(this.entry, meshFrame, this.entry.objFrameVerts);
    if (this.entry.projection) {
      drawProjectedMesh(ctx, this.entry.objFrameVerts, this.entry.objFaces, this.entry.projection, imageRect, {
        fill: "rgba(186, 255, 138, 0.56)",
        stroke: "rgba(105, 176, 54, 0.42)",
        lineWidth: 0.65,
      });
      const handOffset = meshFrame * 778 * 3;
      for (const stream of this.entry.handStreams) {
        if (stream.valid && !stream.valid[meshFrame]) continue;
        const hand = stream.verts.subarray(handOffset, handOffset + 778 * 3);
        drawProjectedMesh(ctx, hand, stream.faces, this.entry.projection, imageRect, {
          fill: stream.fill2d,
          stroke: stream.stroke2d,
          lineWidth: 0.7,
        });
      }
    } else {
      ctx.fillStyle = "#7b8490";
      ctx.font = `${Math.max(12, 12 * (window.devicePixelRatio || 1))}px system-ui, sans-serif`;
      ctx.textAlign = "center";
      ctx.fillText("camera projection metadata missing", w * 0.5, h * 0.5);
    }
  }
}

function videoDuration(video) {
  return video && Number.isFinite(video.duration) && video.duration > 0 ? video.duration : null;
}

function frameToVideoTime(frame, entry, video) {
  const fps = Number(entry.fps) || LAYOUT_FPS;
  const target = (frame + 0.5) / fps;
  const duration = videoDuration(video);
  return duration ? Math.min(Math.max(0, duration - 0.02), target) : target;
}

function videoToFrame(video, entry) {
  const fps = Number(entry.fps) || LAYOUT_FPS;
  return Math.max(0, Math.min(entry.numFrames - 1, Math.floor(video.currentTime * fps + 1e-3)));
}

function seekVideo(video, target, tolerance) {
  if (!video || !Number.isFinite(target) || video.readyState === 0 || video.seeking) return;
  if (Math.abs(video.currentTime - target) > tolerance) {
    try { video.currentTime = target; } catch (_) {}
  }
}

function ensureVideoPlaying(video) {
  if (!video || !video.paused || video.dataset.playRequested) return;
  video.dataset.playRequested = "1";
  video.play().catch(() => {}).finally(() => { delete video.dataset.playRequested; });
}

function videoSourceSize(video, projection) {
  if (video && video.videoWidth > 0 && video.videoHeight > 0) {
    return {w: video.videoWidth, h: video.videoHeight};
  }
  if (projection && projection.width && projection.height) {
    return {w: projection.width, h: projection.height};
  }
  return {w: 640, h: 480};
}

function containRect(srcW, srcH, x, y, w, h) {
  const scale = Math.min(w / Math.max(1, srcW), h / Math.max(1, srcH));
  const dw = srcW * scale;
  const dh = srcH * scale;
  return {x: x + (w - dw) * 0.5, y: y + (h - dh) * 0.5, w: dw, h: dh};
}

function projectVertex(verts, idx, projection, rect) {
  const scale = projection.scale || 1;
  const center = projection.center || [0, 0, 0];
  const x = verts[idx] / scale + center[0];
  const y = verts[idx + 1] / scale + center[1];
  const z = verts[idx + 2] / scale + center[2];
  if (!Number.isFinite(z) || z <= 1e-5) return null;
  const u = projection.focal * x / z + projection.cx;
  const v = projection.focal * y / z + projection.cy;
  if (!Number.isFinite(u) || !Number.isFinite(v)) return null;
  return {
    x: rect.x + (u / projection.width) * rect.w,
    y: rect.y + (v / projection.height) * rect.h,
    z,
  };
}

function drawProjectedMesh(ctx, verts, faces, projection, rect, style) {
  ctx.save();
  ctx.fillStyle = style.fill;
  ctx.strokeStyle = style.stroke;
  ctx.lineWidth = Math.max(0.5, style.lineWidth * (window.devicePixelRatio || 1));
  for (let i = 0; i < faces.length; i += 3) {
    const a = projectVertex(verts, faces[i] * 3, projection, rect);
    const b = projectVertex(verts, faces[i + 1] * 3, projection, rect);
    const c = projectVertex(verts, faces[i + 2] * 3, projection, rect);
    if (!a || !b || !c) continue;
    if (!triangleNearImage(a, b, c, rect)) continue;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.lineTo(c.x, c.y);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
  ctx.restore();
}

function triangleNearImage(a, b, c, rect) {
  const minX = Math.min(a.x, b.x, c.x);
  const maxX = Math.max(a.x, b.x, c.x);
  const minY = Math.min(a.y, b.y, c.y);
  const maxY = Math.max(a.y, b.y, c.y);
  const margin = Math.max(rect.w, rect.h) * 0.2;
  return maxX >= rect.x - margin && minX <= rect.x + rect.w + margin && maxY >= rect.y - margin && minY <= rect.y + rect.h + margin;
}

function makeProgram(gl, vsSource, fsSource) {
  const vs = compile(gl, gl.VERTEX_SHADER, vsSource);
  const fs = compile(gl, gl.FRAGMENT_SHADER, fsSource);
  const program = gl.createProgram();
  gl.attachShader(program, vs); gl.attachShader(program, fs); gl.linkProgram(program);
  if (!gl.getProgramParameter(program, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(program));
  return program;
}

function compile(gl, type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source); gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(shader));
  return shader;
}

function indexBuffer(gl, data) {
  const buffer = gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, data, gl.STATIC_DRAW);
  buffer.indexType = data instanceof Uint32Array ? gl.UNSIGNED_INT : gl.UNSIGNED_SHORT;
  return buffer;
}

function bindFloatBuffer(gl, loc, buffer, data, usage) {
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ARRAY_BUFFER, data, usage);
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 3, gl.FLOAT, false, 0, 0);
}

function drawIndexed(gl, buffer, count, colorLoc, color, mode) {
  gl.uniform4fv(colorLoc, color);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, buffer);
  gl.drawElements(mode, count, buffer.indexType || gl.UNSIGNED_SHORT, 0);
}

function viewRot(yaw, pitch) {
  const cy = Math.cos(yaw), sy = Math.sin(yaw);
  const cx = Math.cos(pitch), sx = Math.sin(pitch);
  return new Float32Array([
    cy, sy * sx, sy * cx,
    0,  cx,     -sx,
    -sy, cy * sx, cy * cx
  ]);
}

function resizeCanvas(canvas) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = Math.max(1, Math.floor(rect.width * dpr));
  const h = Math.max(1, Math.floor(rect.height * dpr));
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
  }
}

function entryForCanvas(canvas) {
  const ex = DATA.examples[Number(canvas.dataset.example)];
  return ex.baselines[canvas.dataset.baseline];
}

function exampleForCanvas(canvas) {
  return DATA.examples[Number(canvas.dataset.example)];
}

buildTable();

const videoObserver = new IntersectionObserver(entries => {
  for (const item of entries) {
    if (!item.isIntersecting) continue;
    const video = item.target;
    if (!video.src && video.dataset.src) {
      video.src = video.dataset.src;
      video.load();
    }
    videoObserver.unobserve(video);
  }
}, {rootMargin: "800px 0px"});
for (const video of document.querySelectorAll("video.lazy-video")) videoObserver.observe(video);

const layouts = [];
for (const canvas of document.querySelectorAll(".layout-canvas")) {
  layouts.push(new Layout2D(canvas, entryForCanvas(canvas), exampleForCanvas(canvas)));
}
const pairs = Array.from(document.querySelectorAll(".viewer-canvas")).map(canvas => {
  const layoutId = canvas.id.replace("viewer", "layout");
  return {
    canvas,
    entry: entryForCanvas(canvas),
    viewer: null,
    frame: 0,
    frameCarry: 0,
    playing: true,
    layout: layouts.find(l => l.canvas.id === layoutId),
    slider: document.querySelector(`input[data-target="${canvas.id}"]`),
    readout: document.getElementById(`${canvas.id}-readout`),
  };
});
const pointmapPairs = Array.from(document.querySelectorAll(".pointmap-canvas")).map(canvas => {
  return {
    canvas,
    spec: DATA.examples[Number(canvas.dataset.example)][canvas.dataset.pointmap],
    video: canvas.parentElement.querySelector(".pointmap-video"),
    frame: 0,
    frameCarry: 0,
    playing: true,
    asset: null,
    viewer: null,
    loading: null,
    loadingError: null,
  };
});

function ensurePointmap(pair) {
  if (pair.viewer && pair.viewer.gl && !pair.viewer.gl.isContextLost()) return pair.viewer;
  if (!pair.asset) {
    if (!pair.loading && !pair.loadingError) {
      pair.loading = loadPointmap(pair.spec)
        .then(asset => { pair.asset = asset; pair.loading = null; })
        .catch(err => { pair.loading = null; pair.loadingError = err; });
    }
    return null;
  }
  try {
    if (pair.video && !pair.video.src && pair.video.dataset.src) {
      pair.video.src = pair.video.dataset.src;
      pair.video.load();
    }
    pair.viewer = new PointmapViewer(pair.canvas, pair.asset, pair.video);
    return pair.viewer;
  } catch (err) {
    pair.loadingError = err;
    return null;
  }
}

function releasePointmap(pair) {
  if (!pair.viewer) return;
  pair.viewer.destroy();
  pair.viewer = null;
}

function ensureViewer(pair) {
  if (pair.viewer && pair.viewer.gl && !pair.viewer.gl.isContextLost()) return pair.viewer;
  if (!pair.entry.arrays) {
    if (!pair.loading && !pair.loadingError) {
      pair.loading = loadEntry(pair.entry)
        .then(() => { pair.loading = null; })
        .catch(err => { pair.loading = null; pair.loadingError = err; });
    }
    if (pair.loadingError) drawCanvasMessage(pair.canvas, String(pair.loadingError.message || pair.loadingError));
    return null;
  }
  if (pair.viewer) {
    pair.viewer.destroy();
    pair.viewer = null;
  }
  try {
    pair.viewer = new WebglViewer(pair.canvas, pair.entry);
    pair.viewer.frame = pair.frame;
    pair.viewer.frameCarry = pair.frameCarry;
    pair.viewer.playing = pair.playing;
    return pair.viewer;
  } catch (err) {
    const ctx = pair.canvas.getContext("2d");
    resizeCanvas(pair.canvas);
    ctx.clearRect(0, 0, pair.canvas.width, pair.canvas.height);
    ctx.fillStyle = "#7b8490";
    ctx.font = `${Math.max(12, 12 * (window.devicePixelRatio || 1))}px system-ui, sans-serif`;
    ctx.fillText(String(err && err.message ? err.message : "WebGL unavailable"), 18, 28);
    return null;
  }
}

function drawCanvasMessage(canvas, message) {
  const ctx = canvas.getContext("2d");
  resizeCanvas(canvas);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#7b8490";
  ctx.font = `${Math.max(12, 12 * (window.devicePixelRatio || 1))}px system-ui, sans-serif`;
  ctx.fillText(message, 18, 28);
}

function releaseViewer(pair) {
  if (!pair.viewer) return;
  pair.frame = pair.viewer.frame;
  pair.frameCarry = pair.viewer.frameCarry;
  pair.playing = pair.viewer.playing;
  pair.viewer.destroy();
  pair.viewer = null;
}

for (const button of document.querySelectorAll('button[data-action="play"]')) {
  button.addEventListener("click", () => {
    const pair = pairs.find(p => p.canvas.id === button.dataset.target);
    if (!pair) return;
    pair.playing = !pair.playing;
    if (pair.viewer) pair.viewer.playing = pair.playing;
    if (!pair.playing && pair.layout) pair.layout.pauseVideos();
    button.textContent = pair.playing ? "Pause" : "Play";
  });
}
for (const slider of document.querySelectorAll('input[data-action="seek"]')) {
  slider.addEventListener("input", () => {
    const pair = pairs.find(p => p.canvas.id === slider.dataset.target);
    const frame = Number(slider.value);
    if (pair) {
      pair.frame = Math.max(0, Math.min(pair.entry.numFrames - 1, frame | 0));
      pair.frameCarry = 0;
      pair.playing = false;
      if (pair.viewer) {
        pair.viewer.setFrame(pair.frame);
        pair.viewer.playing = false;
      }
      if (pair.layout) {
        pair.layout.setFrame(pair.frame);
        pair.layout.syncToViewerFrame(pair.frame, false);
        pair.layout.draw();
      }
    }
  });
}
for (const input of document.querySelectorAll('input[data-action="layout-offset"]')) {
  input.addEventListener("input", () => {
    const pair = pairs.find(p => p.layout && p.layout.canvas.id === input.dataset.target);
    if (!pair || !pair.layout) return;
    pair.layout.setMeshOffset(Number(input.value));
    pair.layout.draw();
  });
}

function isNearViewport(element) {
  if (!element || element.offsetParent === null) return false;
  const rect = element.getBoundingClientRect();
  const margin = Math.max(400, window.innerHeight * 0.75);
  return rect.bottom >= -margin && rect.top <= window.innerHeight + margin;
}

let last = performance.now();
function animate(now) {
  const dt = (now - last) / 1000;
  last = now;
  for (const pair of pairs) {
    const layout = pair.layout;
    const active = isNearViewport(pair.canvas) || (layout && isNearViewport(layout.canvas));
    if (!active) {
      if (layout) layout.pauseVideos();
      releaseViewer(pair);
      continue;
    }

    const viewer = ensureViewer(pair);
    if (!viewer) continue;
    viewer.playing = pair.playing;
    viewer.frame = pair.frame;
    viewer.frameCarry = pair.frameCarry;

    if (pair.playing) {
      let frameFromVideo = null;
      if (layout) frameFromVideo = layout.syncToViewerFrame(viewer.frame, true);
      if (frameFromVideo !== null) {
        viewer.frame = frameFromVideo;
        viewer.frameCarry = 0;
      } else {
        viewer.frameCarry += dt * (Number(viewer.entry.fps) || LAYOUT_FPS);
        const steps = Math.floor(viewer.frameCarry);
        if (steps > 0) {
          viewer.frame = (viewer.frame + steps) % viewer.entry.numFrames;
          viewer.frameCarry -= steps;
        }
      }
    } else if (layout) {
      layout.syncToViewerFrame(viewer.frame, false);
    }
    pair.frame = viewer.frame;
    pair.frameCarry = viewer.frameCarry;
    pair.playing = viewer.playing;
    if (pair.slider) pair.slider.value = viewer.frame;
    if (pair.readout) pair.readout.textContent = `${viewer.frame} / ${viewer.entry.numFrames - 1}`;
    viewer.draw();
    if (layout) {
      layout.setFrame(viewer.frame);
      layout.setPlaying(viewer.playing);
      layout.draw();
    }
  }
  for (const pair of pointmapPairs) {
    if (!isNearViewport(pair.canvas)) {
      releasePointmap(pair);
      continue;
    }
    if (pair.playing && pair.spec.numFrames > 1) {
      const example = DATA.examples[Number(pair.canvas.dataset.example)];
      pair.frameCarry += dt * (Number(example.fps) || LAYOUT_FPS);
      const steps = Math.floor(pair.frameCarry);
      if (steps > 0) {
        pair.frame = (pair.frame + steps) % pair.spec.numFrames;
        pair.frameCarry -= steps;
      }
    }
    const viewer = ensurePointmap(pair);
    if (viewer) {
      viewer.setFrame(pair.frame, pair.playing);
      viewer.draw();
    }
  }
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>
