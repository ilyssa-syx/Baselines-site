async function selectExample(index){const token=++state.token;pause();if(state.abort)state.abort.abort();clear();const controller=new AbortController();state.abort=controller;state.bundle=null;state.frame=0;const example=MANIFEST.examples[index];state.example=example;state.fps=example.renderedFps;els.fps.value=state.fps;els.frame.max=example.frameCount-1;els.number.max=example.frameCount-1;els.video.src=assetUrl(example.videoSrc);els.video.loop=true;els.video.load();document.documentElement.style.setProperty('--image-aspect',`${example.imageWidth}/${example.imageHeight}`);els.status.textContent='Loading hands and object meshes…';const url=new URL(location.href);url.searchParams.set('example',example.key);history.replaceState(null,'',url);try{const [bundle,...sources]=await Promise.all([fetchBundle(example.dataSrc,controller.signal),...MANIFEST.layers.map(layer=>loadGltf(example.meshes[layer.key],controller.signal))]);if(token!==state.token)return;if(bundle.F!==example.frameCount||bundle.L!==MANIFEST.layers.length)throw new Error('Alignment bundle does not match manifest');state.bundle=bundle;MANIFEST.layers.forEach((layer,index)=>{const overlayScene=new THREE.Scene(),overlayCamera=new THREE.Camera();overlayCamera.matrixAutoUpdate=false;overlayCamera.matrixWorld.identity();overlayCamera.matrixWorldInverse.identity();const entry={overlayScene,overlayCamera,objectOverlay:styledObject(sources[index],layer,true,index),objectWorld:styledObject(sources[index],layer,false,index),handsOverlay:[],handsWorld:[]};overlayScene.add(entry.objectOverlay);worldScene.add(entry.objectWorld);for(let hand=0;hand<bundle.H;hand++){const overlay=handMesh(bundle,layer,index,hand,true),world=handMesh(bundle,layer,index,hand,false);entry.handsOverlay.push(overlay);entry.handsWorld.push(world);overlayScene.add(overlay);worldScene.add(world)}state.layers.set(layer.key,entry)});updateFrame(0,true);fit();els.hint.textContent=`${example.frameCount} synchronized SAM3D samples (source stride ${example.frameStride}). Every color represents one complete hand-object alignment.`}catch(error){if(token!==state.token||error.name==='AbortError')return;els.status.textContent=`Load failed: ${error.message}`;els.hint.textContent='Serve this directory over HTTP; file:// cannot fetch compressed visualization assets.';console.error(error)}}
function slotRect(slot){const rect=slot.getBoundingClientRect(),width=Math.round(rect.width),height=Math.round(rect.height);if(width<1||height<1||rect.bottom<=0||rect.top>=innerHeight)return null;renderer.setViewport(Math.round(rect.left),Math.round(innerHeight-rect.bottom),width,height);renderer.setScissor(Math.round(rect.left),Math.round(innerHeight-rect.bottom),width,height);renderer.setScissorTest(true);return{width,height}}function renderOverlay(){if(!slotRect(els.overlay))return;renderer.setClearColor(0,0);renderer.clear(true,true,true);MANIFEST.layers.forEach(layer=>{const entry=state.layers.get(layer.key);if(!entry)return;renderer.clearDepth();renderer.render(entry.overlayScene,entry.overlayCamera)})}function renderWorld(){const size=slotRect(els.world);if(!size)return;renderer.setClearColor(0xe9eef5,1);renderer.clear(true,true,true);if(Math.abs(worldCamera.aspect-size.width/size.height)>.001){worldCamera.aspect=size.width/size.height;worldCamera.updateProjectionMatrix()}renderer.render(worldScene,worldCamera)}function render(){renderer.setSize(innerWidth,innerHeight,false);renderer.setScissorTest(false);renderer.setClearColor(0,0);renderer.clear();renderOverlay();renderWorld();renderer.setScissorTest(false);state.render=false}
function animate(now){if(state.playing&&state.bundle){let next=state.frame;if(els.video.readyState>=2&&!els.video.paused)next=Math.min(state.bundle.F-1,Math.floor(els.video.currentTime*state.example.renderedFps+.001));else{state.carry+=(now-state.last)/1000*state.fps;const steps=Math.floor(state.carry);if(steps){next=(state.frame+steps)%state.bundle.F;state.carry-=steps}}if(next!==state.frame)updateFrame(next,false)}if(controls.update())state.render=true;state.last=now;if(state.render)render();requestAnimationFrame(animate)}
options();controlsUi();els.summary.textContent=`${MANIFEST.examples.length} examples · GT + 2 alignments`;const requested=new URL(location.href).searchParams.get('example'),initial=Math.max(0,MANIFEST.examples.findIndex(example=>example.key===requested));els.example.value=initial;els.example.onchange=()=>selectExample(Number(els.example.value));els.play.onclick=()=>state.playing?pause():play();els.frame.oninput=()=>{pause();updateFrame(els.frame.value,true)};els.number.onchange=()=>{pause();updateFrame(els.number.value,true)};els.fps.onchange=()=>setFps(els.fps.value);els.video.addEventListener('loadedmetadata',()=>updateFrame(state.frame,true));els.video.addEventListener('seeked',drawVideo);els.reset.onclick=fit;addEventListener('resize',()=>{drawVideo();state.render=true},{passive:true});addEventListener('keydown',event=>{const tag=document.activeElement&&document.activeElement.tagName;if(['INPUT','SELECT','BUTTON'].includes(tag))return;if(event.code==='Space'){event.preventDefault();state.playing?pause():play()}if(event.code==='ArrowRight'){pause();updateFrame(state.frame+1,true)}if(event.code==='ArrowLeft'){pause();updateFrame(state.frame-1,true)}});selectExample(initial);requestAnimationFrame(animate);
